name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.x'

      - name: Generate Native Folders
        run: flutter create --platforms=android --org com.shivaww.creatorhub .

      - name: Add Android Permissions & Config
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          
          # Create res/xml directory and file_paths.xml
          mkdir -p android/app/src/main/res/xml
          echo '<?xml version="1.0" encoding="utf-8"?><paths xmlns:android="http://schemas.android.com/apk/res/android"><external-path name="external_files" path="."/><cache-path name="cache_files" path="."/><files-path name="files" path="."/></paths>' > android/app/src/main/res/xml/file_paths.xml

          # 1. Define segments to insert
          PERMISSIONS="<uses-permission android:name=\"android.permission.RECEIVE_BOOT_COMPLETED\"/><uses-permission android:name=\"android.permission.POST_NOTIFICATIONS\"/><uses-permission android:name=\"android.permission.SCHEDULE_EXACT_ALARM\"/><uses-permission android:name=\"android.permission.USE_EXACT_ALARM\"/><uses-permission android:name=\"android.permission.WAKE_LOCK\"/><uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\"/><uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\"/>"
          QUERIES="<queries><intent><action android:name=\"android.intent.action.VIEW\" /><data android:mimeType=\"*/*\" /></intent></queries>"
          RECEIVERS="<receiver android:exported=\"false\" android:name=\"com.dexterous.flutterlocalnotifications.ScheduledNotificationReceiver\" /><receiver android:exported=\"false\" android:name=\"com.dexterous.flutterlocalnotifications.ScheduledNotificationBootReceiver\"><intent-filter><action android:name=\"android.intent.action.BOOT_COMPLETED\"/><action android:name=\"android.intent.action.MY_PACKAGE_REPLACED\"/><action android:name=\"android.intent.action.QUICKBOOT_POWERON\" /><action android:name=\"com.htc.intent.action.QUICKBOOT_POWERON\"/></intent-filter></receiver><provider android:name=\"com.vincent.filepicker.FileProvider\" android:authorities=\"\${applicationId}.provider\" android:exported=\"false\" android:grantUriPermissions=\"true\"><meta-data android:name=\"android.support.FILE_PROVIDER_PATHS\" android:resource=\"@xml/file_paths\" /></provider>"

          # 2. Use 'sed' to insert before <application (Permissions and Queries)
          sed -i "/<application/i $PERMISSIONS" $MANIFEST_PATH
          sed -i "/<application/i $QUERIES" $MANIFEST_PATH
          
          # 3. Use 'sed' to insert before </application (Receivers and Provider)
          sed -i "/<\/application/i $RECEIVERS" $MANIFEST_PATH

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZenithCreatorHub-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
